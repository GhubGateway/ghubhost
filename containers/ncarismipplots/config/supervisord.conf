[supervisord]
nodaemon=true

[program:jupyter]
user=ghubhost
command=jupyter notebook /home/ghubhost/ncarismipplots/CESM_display_final.ipynb --notebook-dir=/home/ghubhost/ncarismipplots --port=8888 --no-browser --ip=0.0.0.0 --allow-root
autorestart=True
startsecs=60
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
redirect_stderr=true
environment = HOME="/home/ghubhost",USER="ghubhost"
