[supervisord]
nodaemon=true

[program:jupyter]
user=ghubuser
command=jupyter notebook /home/ghubuser/alps2/improved/main.ipynb --notebook-dir=/home/ghubuser/alps2/improved --port=8888 --no-browser --ip=0.0.0.0 --allow-root
autorestart=True
startsecs=60
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
redirect_stderr=true
environment = HOME="/home/ghubuser",USER="ghubuser"
